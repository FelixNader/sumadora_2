<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#d9ceb8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sumadora Contable</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="calculator-card">
        <header class="calculator-header">
          <div class="title-block">
            <p class="kicker">Registradora Ochentera</p>
            <h1>Sumadora Contable</h1>
            <p class="subtitle">Motor de mostrador con cinta, negocio y cambio.</p>
          </div>
          <div class="header-actions">
            <div class="status-pill">
              <span>Estado</span>
              <strong data-estado>encendida</strong>
            </div>
          </div>
        </header>

        <section class="display-wrap">
          <div class="display-topline">
            <div class="info-chips">
              <span class="chip chip-mode" data-meta-mode>DEC 2</span>
              <span class="chip chip-tax" data-meta-tax>IVA 16.00%</span>
              <span class="chip chip-rate" data-meta-rate>RATE 1.00</span>
              <span class="chip chip-pub" data-meta-pub>PUB -</span>
            </div>
            <button class="metrics-toggle" type="button" aria-label="Mostrar métricas" aria-expanded="false">
              <span class="metrics-toggle-icon">▼</span>
            </button>
          </div>

          <div class="metrics">
            <div class="metric-card">
              <span>Ultimo subtotal</span>
              <strong data-subtotal>-</strong>
            </div>
            <div class="metric-card">
              <span>Gran total</span>
              <strong data-gran-total>0</strong>
            </div>
            <div class="metric-card">
              <span>Memoria</span>
              <strong data-memoria>0</strong>
            </div>
            <div class="metric-card">
              <span>Tipo publicado</span>
              <strong data-pub>-</strong>
            </div>
          </div>

          <div class="quick-core">
            <div class="stack-block">
              <span class="stack-label">Precision</span>
              <div class="mode-switch">
                <button data-key="f" data-decimal-mode="F" class="mini-key mode-key" type="button">F</button>
                <button data-key="d" data-decimal-mode="2" class="mini-key mode-key" type="button">2</button>
                <button data-key="t" data-decimal-mode="3" class="mini-key mode-key" type="button">3</button>
                <button data-key="c" data-decimal-mode="4" class="mini-key mode-key" type="button">4</button>
              </div>
            </div>
            <div class="stack-block">
              <span class="stack-label">Memoria</span>
              <div class="memory-strip">
                <button data-key="n" class="mini-key memory-key" type="button">M+</button>
                <button data-key="v" class="mini-key memory-key" type="button">M-</button>
                <button data-key="m" class="mini-key memory-key" type="button">MR</button>
                <button data-key="x" class="mini-key memory-key" type="button">MC</button>
              </div>
            </div>
          </div>
        </section>

        <section class="keypad keypad-unified" data-keypad>
          <div class="display-glass keypad-display">
            <div class="display-caption">Importe activo</div>
            <div class="display-text" data-display data-mode="listo">0</div>
          </div>

          <button data-key="p" class="key fn-tax">%</button>
          <button data-key="i" class="key fn-tax">IVA+</button>
          <button data-key="u" class="key fn-tax">IVA-</button>
          <button data-key="y" class="key fn-convert">CONV</button>
          <button data-key="r" class="key fn-tax" data-tax-rate>TAX</button>

          <button data-key="7" class="key">7</button>
          <button data-key="8" class="key">8</button>
          <button data-key="9" class="key">9</button>
          <button data-key="/" class="key accent">/</button>
          <button data-key="k" class="key fn-business">COST</button>

          <button data-key="4" class="key">4</button>
          <button data-key="5" class="key">5</button>
          <button data-key="6" class="key">6</button>
          <button data-key="*" class="key accent">*</button>
          <button data-key="l" class="key fn-business">SELL</button>

          <button data-key="1" class="key">1</button>
          <button data-key="2" class="key">2</button>
          <button data-key="3" class="key">3</button>
          <button data-key="-" class="key accent">-</button>
          <button data-key="h" class="key fn-business">MAR</button>

          <button data-key="0" class="key">0</button>
          <button data-key="." class="key">.</button>
          <button data-key="=" class="key accent">=</button>
          <button data-key="+" class="key accent">+</button>
          <button data-key="o" class="key fn-tourist" data-out-rate>OUT</button>

          <button data-key="a" class="key utility">A</button>
          <button data-key="e" class="key utility">E</button>
          <button data-key="s" class="key utility">S</button>
          <button data-key="g" class="key utility">G</button>
          <button data-key="b" class="key fn-tourist" data-spread-rate>SPD</button>

          <button data-key="w" class="key fn-convert" data-conversion-rate>RATE</button>
          <button data-key="j" class="key fn-tourist">PUB</button>
          <button data-key="z" class="key fn-tourist">USD</button>
        </section>
      </section>

      <div class="paper-sheet" data-paper-sheet>
        <div class="sheet-backdrop" data-paper-backdrop></div>
        <section class="paper-card">
          <div class="sheet-handle"></div>
          <div class="panel-switch">
            <button data-panel="cinta" data-active="true">Cinta</button>
            <button data-panel="log" data-active="false">Log</button>
          </div>
          <pre class="paper-output" data-panel-body="cinta" data-cinta></pre>
          <pre class="paper-output" data-panel-body="log" data-log hidden></pre>
        </section>
      </div>

      <button class="paper-trigger" type="button" data-paper-trigger aria-label="Abrir cinta">
        <span>Cinta</span>
        <span class="paper-trigger-count" data-paper-count>0</span>
      </button>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
